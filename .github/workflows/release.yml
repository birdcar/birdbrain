name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_VERSION" src/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" src/Info.plist

      - name: Build
        run: make build

      - name: Create distributable zip
        run: make dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Birdbrain-*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
