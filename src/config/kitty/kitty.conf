# Birdbrain — Kitty config
# Colors are loaded from dark-theme.auto.conf / light-theme.auto.conf
# based on macOS appearance (automatic switching)

# Window chrome
window_padding_width 12
confirm_os_window_close 0

# Font
font_family      SF Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Behavior
tab_bar_style powerline
tab_bar_edge top
tab_title_template " {index}: {title} "
enable_audio_bell no
shell_integration no-title

# Scrollback
scrollback_lines 10000

# macOS specific
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_titlebar_color background

# Keyboard shortcuts — keep it simple
# Cmd+S sends Ctrl+S to the terminal app (Neovim uses it for save-and-quit)
map cmd+s send_text all \x13
map cmd+q quit
map cmd+w close_tab
map cmd+t launch --type=tab
map cmd+o launch --type=tab --env BIRDBRAIN_OPEN_DIR=
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
